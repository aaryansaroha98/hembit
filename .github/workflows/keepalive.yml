name: Keepalive Ping

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "KEEPALIVE_URL secret is not set."
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            --max-time 20 \
            --retry 2 \
            --retry-delay 5 \
            "$KEEPALIVE_URL"
